name: pnpm CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Run lint check
        run: pnpm run lint:check

  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Run build
        run: pnpm run build

  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Detect tests
        id: detect_tests
        run: |
          if git ls-files 'tests/**/*.ts' | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run test
        if: steps.detect_tests.outputs.has_tests == 'true'
        run: pnpm run test

      - name: No tests present
        if: steps.detect_tests.outputs.has_tests != 'true'
        run: echo "No tests detected; skipping test step."
